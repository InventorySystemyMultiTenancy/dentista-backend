services:
  - type: web
    name: dentista-backend
    runtime: node
    plan: free
    branch: master
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dentista-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: dentista-db
    plan: free
